# https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/yazi-default.toml

[mgr]
show_hidden = true

[preview]
wrap = "yes"
max_width = 1000
max_height = 1000
image_delay = 5
image_filter = "triangle"
image_quality = 50

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]

evince = [{ run = 'evince "$@"', desc = "evince", for = "unix" }]
foliate = [{ run = 'foliate "$@"', desc = "foliate", for = "unix" }]
zathura = [{ run = 'zathura "$@"', desc = "zathura", for = "unix" }]

imv = [{ run = 'imv "$@"', desc = "imv", for = "unix" }]
imv-dir = [{ run = 'imv-dir "$@"', desc = "imv-dir", for = "unix" }]
qview = [{ run = 'qview "$@"', desc = "qview", for = "unix" }]

mpv = [{ run = 'mpv --force-window=yes "$@"', desc = "mpv", for = "unix" }]
vlc = [{ run = 'vlc "$@"', desc = "vlc", for = "unix" }]

extract = [
  { run = 'for f in "$@"; do ouch d -y "$f" -d "${f%.*}"; done', desc = "Extract to dir with ouch", for = "unix" },
]

[open]
prepend_rules = [
  { mime = "application/pdf", use = [
    "evince",
    "zathura",
  ] },
  { mime = "*.cbz", use = "evince" },
  { mime = "*.epub", use = "foliate" },
  { mime = "image/*", use = [
    "imv",
    "qview",
  ] },
  { mime = "video/*", use = [
    "mpv",
    "vlc",
  ] },
]

# yazi-rs/plugins:git
[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

# yazi-rs/plugins:git
[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"

[plugin]
prepend_previewers = [
  # Archive
  # https://github.com/ndtoan96/ouch.yazi#preview
  { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run = "ouch" },
  # Disable video
  { mime = "video/*", run = "noop" },
]

prepend_preloaders = [
  { mime = "video/*", run = "noop" },
  { mime = "application/pdf", run = "noop" },
]
