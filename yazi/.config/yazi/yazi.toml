# https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/yazi-default.toml

[mgr]
show_hidden = true


[preview]
wrap = "yes"
max_width = 1000
max_height = 1000
image_delay = 5
image_filter = "triangle"
image_quality = 50


[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]

evince = [{ run = 'evince "$@"', desc = "evince", for = "unix" }]
foliate = [{ run = 'foliate "$@"', desc = "foliate", for = "unix" }]
zathura = [{ run = 'zathura "$@"', desc = "zathura", for = "unix" }]

imv = [{ run = 'imv "$@"', desc = "imv", for = "unix" }]
imv-dir = [{ run = 'imv-dir "$@"', desc = "imv-dir", for = "unix" }]
qview = [{ run = 'qview "$@"', desc = "qview", for = "unix" }]
gthumb = [{ run = 'gthumb "$@"', desc = "gthumb", for = "linux" }]

mpv = [{ run = 'mpv --force-window=yes "$@" --loop', desc = "mpv", for = "unix" }]
vlc = [{ run = 'vlc "$@"', desc = "vlc", for = "unix" }]

ouch = [
  { run = 'for f in "$@"; do base="${f##*/}"; base="${base%.tar.*}"; base="${base%.*}"; ouch d -y "$f" -d "$(dirname "$f")/$base"; done', desc = "Extract to dir", for = "unix" },
  { run = 'ouch d -y "$@"', desc = "Extract to CWD", for = "unix" },
]


[open]
prepend_rules = [
  { mime = "application/pdf", use = [
    "evince",
    "zathura",
  ] },
  { url = "*.cbz", use = "evince" },
  { url = "*.epub", use = "foliate" },
  { mime = "image/*", use = [
    "imv",
    "qview",
    "gthumb",
  ] },
  { mime = "video/*", use = [
    "mpv",
    "vlc",
  ] },
  { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", use = "ouch" },
]


[plugin]
prepend_fetchers = [
  # yazi-rs/plugins:git
  { url = "*", run = "git", group = "git" },
  { url = "*/", run = "git", group = "git" },
]

prepend_previewers = [
  # https://github.com/ndtoan96/ouch.yazi#preview
  { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run = "ouch --archive-icon='🗄️ ' --show-file-icons" },
  # Disable video
  { mime = "video/*", run = "noop" },
]

prepend_preloaders = [
  { mime = "video/*", run = "noop" },
  { mime = "application/pdf", run = "noop" },
]
