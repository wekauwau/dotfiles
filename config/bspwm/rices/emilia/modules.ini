[module/launcher]
type = custom/text

label = ˇ░úç
label-foreground = ${color.blue-arch}
label-font = 4

click-left = OpenApps --menu
click-right = OpenApps --reload-bspwm

######################################################

[module/sep]
type = custom/text
label = "  "
label-foreground = ${color.bg}

######################################################

[module/sep-half]
type = custom/text
label = " "
label-background = ${color.bg}

######################################################

[module/bi]
type = custom/text
label = "%{T5}ţéÂ%{T-}"
label-foreground = ${color.mb}
label-background = ${color.bg}

[module/bd]
type = custom/text
label = "%{T5}ţé┤%{T-}"
label-foreground = ${color.mb}
label-background = ${color.bg}

######################################################

[module/bspwm]
type = internal/bspwm

enable-click = true
enable-scroll = false
reverse-scroll = true
pin-workspaces = true
occupied-scroll = false

format = <label-state>
format-font = 3

label-focused = ˇ░«»
label-focused-background = ${color.mb}
label-focused-padding = 1
label-focused-foreground = ${color.yellow}

label-occupied = ˇ░Őá
label-occupied-padding = 1
label-occupied-background = ${color.mb}
label-occupied-foreground= ${color.blue}

label-urgent = %icon%
label-urgent-padding = 0

label-empty = ˇ░ĹŐ
label-empty-foreground = ${color.purple}
label-empty-padding = 1
label-empty-background = ${color.mb}

######################################################

[module/title]
type = internal/xwindow

format = <label>
format-prefix = "ˇ▒éČ "
format-prefix-font = 3
format-prefix-foreground = ${color.red}

label = %title%
label-maxlen = 80

label-empty = "Arch Linux"
label-empty-foreground = ${color.grey}

######################################################

[module/bspm-monocle]
type = custom/script
exec = ~/.config/bspwm/src/bspm-indicator
tail = true
label-foreground = ${color.green}

######################################################

[module/temperature]
type = internal/temperature

format = <label>
format-prefix = "­čîí "
format-prefix-font = 2
format-prefix-background = ${color.mb}
format-prefix-foreground = ${color.yellow}

label = %temperature-c%
label-background = ${color.mb}

format-warn = <label-warn>
format-warn-prefix = "­čîí "
format-warn-prefix-font = 2
format-warn-prefix-background = ${color.mb}
format-warn-prefix-foreground = ${color.red}

label-warn = %temperature-c%ooking!
label-warn-background = ${color.mb}
label-warn-foreground = ${color.red}

; Seconds to sleep between updates
; Default: 1
interval = 3

; Thermal zone to use
; To list all the zone types, run 
; $ for i in /sys/class/thermal/thermal_zone*; do echo "$i: $(<$i/type)"; done
; Default: 0
thermal-zone = 1


; Base temperature for where to start the ramp (in degrees celsius)
; Default: 0
base-temperature = 35

; Threshold temperature to display warning label (in degrees celsius)
; Default: 80
warn-temperature = 60

######################################################

[module/cpu_bar]
type = internal/cpu
interval = 3

format = <label>
format-prefix = "  ´őŤ "
format-prefix-font = 2
format-prefix-background = ${color.mb}
format-prefix-foreground = ${color.red}

label = "%percentage%%  "
label-background = ${color.mb}

######################################################

[module/memory_bar]
type = internal/memory
interval = 3

format = <label>
format-prefix = "´öŞ "
format-prefix-font = 2
format-prefix-background = ${color.mb}
format-prefix-foreground = ${color.cyan}

label = "%used%  "
label-background = ${color.mb}

######################################################

[module/network]
type = internal/network
interface = ${system.sys_network_interface}

interval = 3
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "´çź "
format-connected-prefix-font = 2
format-connected-background = ${color.mb}
format-connected-foreground = ${color.green}

speed-unit = ""
label-connected = "%{A1:NetManagerDM:}%netspeed%%{A}  "
label-connected-background = ${color.mb}
label-connected-foreground = ${color.amber}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "´çź "
format-disconnected-prefix-font = 2
format-disconnected-prefix-background = ${color.mb}
format-disconnected-foreground = ${color.red}

label-disconnected = "%{A1:NetManagerDM:}Offline%{A}  "
label-disconnected-background = ${color.mb}
label-disconnected-foreground = ${color.red}

######################################################

[module/date]
type = internal/date
interval = 3

time = %I:%M %P
format-background = ${color.mb}
format-foreground = ${color.fg}
;;date-alt = " %A, %d %B %Y"

format = <label>
label = "%{A1:OpenApps --calendar:}%time%%{A}  "

######################################################

[module/battery0]
type = internal/battery
full-at = 99
battery = ${system.sys_battery0}
adapter = ${system.sys_adapter}
poll-interval = 3
time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-background = ${color.mb}
label-charging = " %percentage%%  "

format-discharging = <ramp-capacity><label-discharging>
format-discharging-background = ${color.mb}
label-discharging = " %percentage%%  "

format-full = <label-full>
format-full-background = ${color.mb}
format-full-prefix = ´ëÇ
format-full-prefix-font = 2
format-full-prefix-foreground = ${color.green}
label-full = " %percentage%%  "

ramp-capacity-0 = ´ëä
ramp-capacity-1 = ´ëâ
ramp-capacity-2 = ´ëé
ramp-capacity-3 = ´ëü
ramp-capacity-4 = ´ëÇ
ramp-capacity-foreground = ${color.blue}
ramp-capacity-font = 2

animation-charging-0 = ´ëä
animation-charging-1 = ´ëâ
animation-charging-2 = ´ëé
animation-charging-3 = ´ëü
animation-charging-4 = ´ëÇ
animation-charging-foreground = ${color.green}
animation-charging-font = 2
animation-charging-framerate = 700

######################################################

[module/battery1]
type = internal/battery
full-at = 99
battery = ${system.sys_battery1}
adapter = ${system.sys_adapter}
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-background = ${color.mb}
label-charging = " %percentage%%"

format-discharging = <ramp-capacity><label-discharging>
format-discharging-background = ${color.mb}
label-discharging = " %percentage%%"

format-full = <label-full>
format-full-background = ${color.mb}
format-full-prefix = ´ëÇ
format-full-prefix-font = 2
format-full-prefix-foreground = ${color.green}
label-full = " %percentage%%"

ramp-capacity-0 = ´ëä
ramp-capacity-1 = ´ëâ
ramp-capacity-2 = ´ëé
ramp-capacity-3 = ´ëü
ramp-capacity-4 = ´ëÇ
ramp-capacity-foreground = ${color.blue}
ramp-capacity-font = 2

animation-charging-0 = ´ëä
animation-charging-1 = ´ëâ
animation-charging-2 = ´ëé
animation-charging-3 = ´ëü
animation-charging-4 = ´ëÇ
animation-charging-foreground = ${color.green}
animation-charging-font = 2
animation-charging-framerate = 700
